name: controle_instrumentos
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  image_picker: ^1.1.2
  flutter:
    sdk: flutter
  flutter_localizations:        # ← adicionado para calendário em PT-BR
    sdk: flutter
  intl: any                     # ← necessário para flutter_localizations
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  flutter_svg: ^2.2.3
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  fake_async: ^1.3.2

flutter:
  uses-material-design: true
  assets:
    - assets/menu-icon.png
    - assets/profile.png
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
